apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-kubeflow-namespace-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: DS-DE Kubeflow
data:
  kubeflow-workspace.json: |
    {
      "annotations": { "list": [] },
      "description": "Profile-scoped view of Notebooks, PySpark Jobs, Pipelines, Katib, Volumes, and related Kubeflow workloads for Data Science / Data Engineering teams.",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [
        {
          "asDropdown": false,
          "icon": "external link",
          "includeVars": true,
          "keepTime": true,
          "tags": [],
          "targetBlank": true,
          "title": "Open Kubeflow Notebooks",
          "tooltip": "",
          "type": "link",
          "url": "/jupyter/"
        },
        {
          "icon": "external link",
          "includeVars": true,
          "keepTime": true,
          "targetBlank": true,
          "title": "Open PySpark Jobs",
          "type": "link",
          "url": "/pyspark-jobs/${namespace}/"
        }
      ],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 100,
          "title": "Profile overview",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "description": "Kubeflow Notebook pods (StatefulSet) in this Profile.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "blue", "value": null },
                  { "color": "green", "value": 1 }
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 1 },
          "id": 1,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "count(kube_pod_info{namespace=\"$namespace\", created_by_kind=\"StatefulSet\"}) or vector(0)",
              "legendFormat": "Notebooks",
              "refId": "A"
            }
          ],
          "title": "Notebooks",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "description": "Spark driver/executor pods from Spark Operator / PySpark Jobs.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "purple", "value": null },
                  { "color": "semi-dark-orange", "value": 1 }
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 4, "x": 4, "y": 1 },
          "id": 2,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }
          },
          "targets": [
            {
              "expr": "count(kube_pod_info{namespace=\"$namespace\", created_by_kind=\"SparkApplication\"} or kube_pod_info{namespace=\"$namespace\", pod=~\".*-driver$|.*-exec-[0-9]+$\"}) or vector(0)",
              "refId": "A"
            }
          ],
          "title": "PySpark / Spark pods",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "description": "Kubeflow Pipelines / Argo workflow pods. Empty on this POC until Pipelines is installed.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "#5794F2", "value": null },
                  { "color": "blue", "value": 1 }
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 4, "x": 8, "y": 1 },
          "id": 3,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }
          },
          "targets": [
            {
              "expr": "count(kube_pod_info{namespace=\"$namespace\", pod=~\"(?i).*(pipeline|workflow|argo-).*\"}) or vector(0)",
              "refId": "A"
            }
          ],
          "title": "Pipelines / Workflows",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "description": "Katib experiment / trial / suggestion pods in this Profile.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "super-light-green", "value": null },
                  { "color": "green", "value": 1 }
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 4, "x": 12, "y": 1 },
          "id": 4,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }
          },
          "targets": [
            {
              "expr": "count(kube_pod_info{namespace=\"$namespace\", pod=~\"(?i).*(katib|trial|suggestion).*\"}) or vector(0)",
              "refId": "A"
            }
          ],
          "title": "Katib trials",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "description": "PersistentVolumeClaims used by Notebooks, jobs, and volumes UI.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "semi-dark-blue", "value": null }
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 4, "x": 16, "y": 1 },
          "id": 5,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }
          },
          "targets": [
            {
              "expr": "count(kube_persistentvolumeclaim_info{namespace=\"$namespace\"}) or vector(0)",
              "refId": "A"
            }
          ],
          "title": "Volumes (PVC)",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "description": "Pods not Running/Succeeded in this Profile.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 4, "x": 20, "y": 1 },
          "id": 6,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }
          },
          "targets": [
            {
              "expr": "count(kube_pod_status_phase{namespace=\"$namespace\", phase=~\"Pending|Failed|Unknown\"} == 1) or vector(0)",
              "refId": "A"
            }
          ],
          "title": "Unhealthy pods",
          "type": "stat"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 5 },
          "id": 101,
          "title": "Notebooks",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "description": "CPU usage for Notebook pods (Kubeflow Notebook StatefulSets).",
          "fieldConfig": {
            "defaults": {
              "custom": { "drawStyle": "line", "fillOpacity": 15, "lineWidth": 2, "showPoints": "never" },
              "unit": "cores"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 6 },
          "id": 10,
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom", "showLegend": true, "calcs": ["mean", "max"] },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "expr": "sum by (pod) (rate(container_cpu_usage_seconds_total{namespace=\"$namespace\", container!=\"\", container!=\"POD\"}[5m])) and on(pod) kube_pod_info{namespace=\"$namespace\", created_by_kind=\"StatefulSet\"}",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "title": "Notebook CPU",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "description": "Memory working set for Notebook pods.",
          "fieldConfig": {
            "defaults": {
              "custom": { "drawStyle": "line", "fillOpacity": 15, "lineWidth": 2, "showPoints": "never" },
              "unit": "bytes"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 6 },
          "id": 11,
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom", "showLegend": true, "calcs": ["mean", "max"] },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "expr": "sum by (pod) (container_memory_working_set_bytes{namespace=\"$namespace\", container!=\"\", container!=\"POD\"}) and on(pod) kube_pod_info{namespace=\"$namespace\", created_by_kind=\"StatefulSet\"}",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "title": "Notebook memory",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 14 },
          "id": 102,
          "title": "PySpark Jobs / Spark Operator",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "description": "Driver and executor CPU for SparkApplications submitted via PySpark Jobs or Spark Operator.",
          "fieldConfig": {
            "defaults": {
              "custom": { "drawStyle": "line", "fillOpacity": 20, "lineWidth": 2, "showPoints": "never" },
              "unit": "cores"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 15 },
          "id": 20,
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom", "showLegend": true, "calcs": ["mean", "max"] },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "expr": "sum by (pod) (rate(container_cpu_usage_seconds_total{namespace=\"$namespace\", container!=\"\", container!=\"POD\"}[5m])) and on(pod) (kube_pod_info{namespace=\"$namespace\", created_by_kind=\"SparkApplication\"} or kube_pod_info{namespace=\"$namespace\", pod=~\".*-driver$|.*-exec-[0-9]+$\"})",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "title": "Spark driver/executor CPU",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "description": "Driver and executor memory for Spark workloads.",
          "fieldConfig": {
            "defaults": {
              "custom": { "drawStyle": "line", "fillOpacity": 20, "lineWidth": 2, "showPoints": "never" },
              "unit": "bytes"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 15 },
          "id": 21,
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom", "showLegend": true, "calcs": ["mean", "max"] },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "expr": "sum by (pod) (container_memory_working_set_bytes{namespace=\"$namespace\", container!=\"\", container!=\"POD\"}) and on(pod) (kube_pod_info{namespace=\"$namespace\", created_by_kind=\"SparkApplication\"} or kube_pod_info{namespace=\"$namespace\", pod=~\".*-driver$|.*-exec-[0-9]+$\"})",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "title": "Spark driver/executor memory",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 23 },
          "id": 103,
          "title": "Pipelines, Katib, TensorBoards",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "description": "Pipeline/workflow CPU when Kubeflow Pipelines or Argo workflows run in the Profile. Shows zero until Pipelines is installed on this POC.",
          "fieldConfig": {
            "defaults": {
              "custom": { "drawStyle": "line", "fillOpacity": 12, "lineWidth": 2, "showPoints": "never" },
              "unit": "cores"
            },
            "overrides": []
          },
          "gridPos": { "h": 7, "w": 8, "x": 0, "y": 24 },
          "id": 30,
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "expr": "sum by (pod) (rate(container_cpu_usage_seconds_total{namespace=\"$namespace\", container!=\"\", container!=\"POD\", pod=~\"(?i).*(pipeline|workflow|argo-).*\"}[5m])) or vector(0)",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "title": "Pipelines / Workflows CPU",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "description": "Katib trial and suggestion pod CPU in this Profile.",
          "fieldConfig": {
            "defaults": {
              "custom": { "drawStyle": "line", "fillOpacity": 12, "lineWidth": 2, "showPoints": "never" },
              "unit": "cores"
            },
            "overrides": []
          },
          "gridPos": { "h": 7, "w": 8, "x": 8, "y": 24 },
          "id": 31,
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "expr": "sum by (pod) (rate(container_cpu_usage_seconds_total{namespace=\"$namespace\", container!=\"\", container!=\"POD\", pod=~\"(?i).*(katib|trial|suggestion).*\"}[5m])) or vector(0)",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "title": "Katib experiment CPU",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "description": "TensorBoard pods created from the Kubeflow TensorBoards UI.",
          "fieldConfig": {
            "defaults": {
              "custom": { "drawStyle": "line", "fillOpacity": 12, "lineWidth": 2, "showPoints": "never" },
              "unit": "cores"
            },
            "overrides": []
          },
          "gridPos": { "h": 7, "w": 8, "x": 16, "y": 24 },
          "id": 32,
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "expr": "sum by (pod) (rate(container_cpu_usage_seconds_total{namespace=\"$namespace\", container!=\"\", container!=\"POD\", pod=~\"(?i).*tensorboard.*\"}[5m])) or vector(0)",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "title": "TensorBoard CPU",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 31 },
          "id": 104,
          "title": "Volumes and workload inventory",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "description": "Requested storage per PVC in this Profile (Notebook workspace, PySpark Jobs uploads, etc.).",
          "fieldConfig": {
            "defaults": {
              "custom": { "drawStyle": "bars", "fillOpacity": 60, "lineWidth": 1 },
              "unit": "bytes"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 10, "x": 0, "y": 32 },
          "id": 40,
          "options": {
            "legend": { "displayMode": "table", "placement": "right", "showLegend": true },
            "tooltip": { "mode": "single", "sort": "none" }
          },
          "targets": [
            {
              "expr": "kube_persistentvolumeclaim_resource_requests_storage_bytes{namespace=\"$namespace\"}",
              "legendFormat": "{{persistentvolumeclaim}}",
              "refId": "A"
            }
          ],
          "title": "Volume requests (PVC)",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "description": "All pods in the Profile with owner kind used to classify Notebook vs Spark vs other Kubeflow workloads.",
          "fieldConfig": { "defaults": {}, "overrides": [] },
          "gridPos": { "h": 8, "w": 14, "x": 10, "y": 32 },
          "id": 41,
          "options": { "showHeader": true, "cellHeight": "sm" },
          "targets": [
            {
              "expr": "kube_pod_info{namespace=\"$namespace\"}",
              "format": "table",
              "instant": true,
              "refId": "A"
            },
            {
              "expr": "kube_pod_status_phase{namespace=\"$namespace\"} == 1",
              "format": "table",
              "instant": true,
              "refId": "B"
            }
          ],
          "title": "Profile workload inventory",
          "transformations": [
            {
              "id": "seriesToColumns",
              "options": { "byField": "pod" }
            },
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "Time 1": true,
                  "Time 2": true,
                  "__name__": true,
                  "__name__ 1": true,
                  "__name__ 2": true,
                  "container": true,
                  "endpoint": true,
                  "host_ip": true,
                  "host_network": true,
                  "instance": true,
                  "job": true,
                  "pod_ip": true,
                  "service": true,
                  "uid": true,
                  "Value #A": true,
                  "Value": true
                },
                "indexByName": {
                  "pod": 0,
                  "created_by_kind": 1,
                  "created_by_name": 2,
                  "phase": 3,
                  "node": 4,
                  "namespace": 5
                },
                "renameByName": {
                  "pod": "Workload / Pod",
                  "created_by_kind": "Component type",
                  "created_by_name": "Owner",
                  "phase": "Phase",
                  "node": "Node",
                  "namespace": "Profile namespace",
                  "Value #B": "Active"
                }
              }
            }
          ],
          "type": "table"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["kubeflow", "notebooks", "pipelines", "pyspark", "ds", "de"],
      "templating": {
        "list": [
          {
            "current": {
              "selected": true,
              "text": "kubeflow-user-example-com",
              "value": "kubeflow-user-example-com"
            },
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "definition": "label_values(kube_pod_info{namespace=~\"kubeflow-.*\"}, namespace)",
            "hide": 0,
            "includeAll": false,
            "label": "Kubeflow Profile",
            "multi": false,
            "name": "namespace",
            "options": [],
            "query": {
              "query": "label_values(kube_pod_info{namespace=~\"kubeflow-.*\"}, namespace)",
              "refId": "StandardVariableQuery"
            },
            "refresh": 2,
            "regex": "/^(kubeflow-.+|.*-user-.*)$/",
            "skipUrlSync": false,
            "sort": 1,
            "type": "query"
          }
        ]
      },
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "DS/DE Kubeflow Workspace",
      "uid": "kubeflow-ns",
      "version": 3
    }
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
spec:
  gateways:
    - kubeflow/kubeflow-gateway
  hosts:
    - "*"
  http:
    - match:
        - uri:
            prefix: /grafana/
      route:
        - destination:
            host: kps-grafana.monitoring.svc.cluster.local
            port:
              number: 80
    - match:
        - uri:
            exact: /grafana
      redirect:
        uri: /grafana/
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: grafana
  namespace: monitoring
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/istio-system/sa/istio-ingressgateway-service-account
              - cluster.local/ns/monitoring/sa/kps-grafana
    - when:
        - key: source.namespace
          values:
            - monitoring
